<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Cadastro</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='css/global.css') }}">

<link rel="stylesheet"
href="{{ url_for('static',filename='css/cadastro.css') }}">

</head>

<body>

<div class="container">

<div class="box">

<h1 style="font-family:'Georgia',serif; letter-spacing:1px;">🚗 Parking Padre Longino</h1>

<p>Criar Conta</p>

<form method="POST">

<input
type="text"
name="nome"
placeholder="Nome Completo"
required>

<input
type="text"
name="usuario"
placeholder="Usuário"
required>

<input
type="email"
name="email"
placeholder="Email"

<input
type="password"
name="senha"
placeholder="Senha"
required>

<button type="submit">

Cadastrar

</button>

</form>

<br>

<a href="/">

Voltar ao Login

</a>

</div>

</div>
